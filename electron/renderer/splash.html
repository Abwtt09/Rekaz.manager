<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>ركاز</title>
<style>*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}*::-webkit-scrollbar{display:none}body{background:#FFF;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}#lp{width:1500px;height:1500px}.fo{animation:fo .5s ease forwards}@keyframes fo{to{opacity:0}}.stb{position:fixed;top:0;left:0;display:flex;z-index:999;-webkit-app-region:no-drag}.stb button{width:44px;height:36px;border:none;background:none;cursor:pointer;color:#ccc;font-size:16px;display:flex;align-items:center;justify-content:center}.stb button:hover{background:rgba(0,0,0,0.04)}.stb .cl:hover{background:#C45E4E;color:#fff}</style>
</head><body>
<div style="position:fixed;top:0;left:0;right:0;height:36px;-webkit-app-region:drag;"></div>
<div class="stb" style="left:0;right:auto;">
  <button class="cl" onclick="if(window.electronAPI)electronAPI.winClose()">&#10005;</button>
  <button onclick="if(window.electronAPI)electronAPI.winMaximize()">&#9633;</button>
  <button onclick="if(window.electronAPI)electronAPI.winMinimize()">&#8211;</button>
</div>
<div id="lp"></div>
<div id="splashStatus" style="position:fixed;bottom:30px;left:0;right:0;text-align:center;font-family:Segoe UI,sans-serif;font-size:12px;color:#A09890;"></div>
<audio id="snd" preload="auto"><source src="assets/intro-sound.wav" type="audio/wav"></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script>
history.pushState(null,null,location.href);window.onpopstate=()=>history.pushState(null,null,location.href);
// Version display
try{document.getElementById('splashStatus').textContent='Rekaz v'+(window.electronAPI?.getVersion?.() || '1.0.0-beta');}catch(e){}
if(window.electronAPI?.onUpdateAvailable){electronAPI.onUpdateAvailable(v=>{document.getElementById('splashStatus').textContent='تحديث جديد: v'+v;});}

let done=false;
function go(){
  if(done)return;done=true;
  document.body.classList.add('fo');
  // Check if logged in
  const cid=localStorage.getItem('rekaz_companyId');
  const un=localStorage.getItem('rekaz_username');
  const dest=(cid&&un)?'appchoice':'welcome';
  setTimeout(()=>{if(window.electronAPI)electronAPI.navigate(dest);else location.href=dest+'.html';},500);
}
// Delay sound by 1 second
setTimeout(()=>{try{document.getElementById('snd').play().catch(()=>{});}catch(e){}},1000);
try{const a=lottie.loadAnimation({container:document.getElementById('lp'),renderer:'svg',loop:false,autoplay:true,path:'assets/intro-animation.json'});a.addEventListener('complete',()=>go());}catch(e){setTimeout(go,2000);}
</script></body></html>
