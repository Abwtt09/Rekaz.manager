<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>ركاز</title>
<style>
@font-face{font-family:'H';src:url('assets/fonts/Handicrafts/1774174278664_TheYearofHandicrafts-Regular.otf') format('opentype')}
@font-face{font-family:'H';src:url('assets/fonts/Handicrafts/1774174278663_TheYearofHandicrafts-Bold.otf') format('opentype');font-weight:700}
:root{--a:#8B6D5C;--p:#C2A27E;--bg:#FAF7F4;--t:#3A3028;--t2:#7A6E62;--tl:#A09890;--b:rgba(139,109,92,0.1);--g:rgba(255,255,255,0.55)}
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{display:none}
body{font-family:'H','Segoe UI',sans-serif;background:var(--bg);color:var(--t);height:100vh;display:flex;flex-direction:column;overflow:hidden;background-image:radial-gradient(ellipse at 20% 50%,rgba(194,162,126,0.05) 0%,transparent 60%)}
.tb{height:36px;background:rgba(250,247,244,0.95);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;-webkit-app-region:drag;border-bottom:1px solid rgba(139,109,92,0.06);padding:0 8px;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:6px;-webkit-app-region:no-drag}.tb-l img{height:18px;border-radius:3px}
.tb-l span{font-size:0.72rem;font-weight:600;color:var(--a)}.tb-l small{font-size:0.6rem;color:var(--tl);font-family:'Segoe UI',sans-serif}
.tb-r{display:flex;-webkit-app-region:no-drag}
.wb{width:44px;height:36px;border:none;background:none;cursor:pointer;color:var(--tl);font-size:16px;display:flex;align-items:center;justify-content:center}.wb:hover{background:rgba(0,0,0,0.04)}.wb.cl:hover{background:#C45E4E;color:#fff}
.center{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
.logo{height:64px;border-radius:14px;margin-bottom:8px}
h2{font-size:1.4rem;color:var(--a)}
.sub{color:var(--t2);font-size:0.9rem;margin-top:-16px}
.cards{display:flex;gap:24px}
.card{width:260px;background:var(--g);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.5);border-radius:22px;padding:40px 28px;text-align:center;cursor:pointer;transition:all .3s}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 40px rgba(139,109,92,0.16)}
.card:active{transform:scale(0.96)}
.card-icon{width:80px;height:80px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.card h3{font-size:1.2rem;margin-bottom:8px}.card p{font-size:0.85rem;color:var(--t2);line-height:1.6}
.user-bar{padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--b);flex-shrink:0}
.user-info{display:flex;align-items:center;gap:10px}
.av{width:36px;height:36px;border-radius:10px;background:rgba(139,109,92,0.08);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--a)}
.ubtn{padding:7px 14px;border:1px solid var(--b);border-radius:8px;background:none;font-family:inherit;font-size:0.8rem;cursor:pointer;color:var(--t2)}.ubtn:hover{border-color:var(--a);color:var(--a)}
.ubtn-d{color:#C45E4E;border-color:rgba(196,94,78,0.2)}.ubtn-d:hover{color:#C45E4E;border-color:#C45E4E}
</style></head><body>
<div class="tb" style="direction:ltr;">
  <div class="tb-r"><button class="wb cl" onclick="if(electronAPI)electronAPI.winClose()">&#10005;</button><button class="wb" onclick="if(electronAPI)electronAPI.winMaximize()">&#9633;</button><button class="wb" onclick="if(electronAPI)electronAPI.winMinimize()">&#8211;</button></div>
  <div class="tb-l"><span>ركاز</span><small style="margin-left:4px;">Rekaz</small><img src="assets/img/logo-icon.png" onerror="this.style.display='none'" style="margin-left:6px;"></div>
</div>
<div class="center">
  <img src="assets/img/logo-icon.png" class="logo" onerror="this.style.display='none'">
  <h2>مرحبا بك في ركاز</h2>
  <p class="sub">اختر التطبيق</p>
  <div class="cards">
    <div class="card" onclick="go('dashboard')">
      <div class="card-icon" style="background:rgba(139,109,92,0.08)"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--a)" stroke-width="1.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
      <h3>ركاز للمحاسبة</h3>
      <p>إدارة مالية شاملة - قيود، فواتير، تقارير</p>
    </div>
    <div class="card" onclick="go('pos')">
      <div class="card-icon" style="background:rgba(194,162,126,0.1)"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--p)" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></div>
      <h3>ركاز كاشير</h3>
      <p>نقاط بيع سريعة - بحث، سلة، إيصال</p>
    </div>
  </div>
</div>
<div class="user-bar">
  <div class="user-info"><div class="av" id="uA">م</div><div><div style="font-weight:600;font-size:0.9rem;" id="uN">المستخدم</div><div style="font-size:0.72rem;color:var(--tl);" id="uC">الشركة</div></div></div>
  <div style="display:flex;gap:8px;"><button class="ubtn ubtn-d" onclick="logout()">تسجيل خروج</button></div>
<div style="position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:0.72rem;color:var(--tl);" id="appVersion">Rekaz v1.0.0-beta</div>
</div>
<script>
history.pushState(null,null,location.href);window.onpopstate=()=>history.pushState(null,null,location.href);
const cid=localStorage.getItem('rekaz_companyId'),un=localStorage.getItem('rekaz_username');
if(!cid||!un){if(typeof electronAPI!=='undefined')electronAPI.navigate('welcome');else location.href='welcome.html';}
document.getElementById('uN').textContent=localStorage.getItem('rekaz_displayName')||un||'';
document.getElementById('uC').textContent=localStorage.getItem('rekaz_last_companyName')||'';
document.getElementById('uA').textContent=(localStorage.getItem('rekaz_displayName')||un||'م').charAt(0).toUpperCase();
try{document.getElementById('appVersion').textContent='Rekaz v'+(electronAPI?.getVersion?.() || '1.0.0-beta');}catch(e){}
function go(p){if(typeof electronAPI!=='undefined')electronAPI.navigate(p);else location.href=p+'.html';}
function logout(){localStorage.setItem('rekaz_last_companyId',cid);localStorage.setItem('rekaz_last_username',un);localStorage.setItem('rekaz_last_displayName',localStorage.getItem('rekaz_displayName')||'');localStorage.setItem('rekaz_last_companyName',localStorage.getItem('rekaz_last_companyName')||'');localStorage.removeItem('rekaz_companyId');localStorage.removeItem('rekaz_username');if(typeof electronAPI!=='undefined')electronAPI.navigate('welcome');else location.href='welcome.html';}
</script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
(function(){
  if(typeof gsap==='undefined') return;
  // Logo drop
  gsap.fromTo('.logo',{y:-60,opacity:0,rotation:-10},{y:0,opacity:1,rotation:0,duration:.8,ease:'back.out(2)',delay:.1});
  // Title + subtitle
  gsap.from('h2',{y:30,opacity:0,duration:.6,ease:'power3.out',delay:.5});
  gsap.from('.sub',{y:20,opacity:0,duration:.5,ease:'power2.out',delay:.7});
  // Cards fly from opposite sides
  const cards=[...document.querySelectorAll('.card')];
  if(cards[0]) gsap.fromTo(cards[0],{x:-100,opacity:0,rotation:-8},{x:0,opacity:1,rotation:0,duration:.75,ease:'back.out(1.6)',delay:.85});
  if(cards[1]) gsap.fromTo(cards[1],{x:100,opacity:0,rotation:8},{x:0,opacity:1,rotation:0,duration:.75,ease:'back.out(1.6)',delay:.95});
  // User bar
  gsap.from('.user-bar',{y:40,opacity:0,duration:.6,ease:'power2.out',delay:1.2});

  // Card hover tilt
  cards.forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      const x=((e.clientX-r.left)/r.width-.5)*18;
      const y=((e.clientY-r.top)/r.height-.5)*-18;
      gsap.to(card,{rotationY:x,rotationX:y,duration:.25,ease:'power2.out',transformPerspective:700,scale:1.04});
    });
    card.addEventListener('mouseleave',()=>{
      gsap.to(card,{rotationY:0,rotationX:0,scale:1,duration:.5,ease:'elastic.out(1,.5)'});
    });
    card.addEventListener('click',()=>{
      gsap.to(card,{scale:.9,duration:.15,yoyo:true,repeat:1,ease:'power2.in'});
    });
  });
})();
</script></body></html>
